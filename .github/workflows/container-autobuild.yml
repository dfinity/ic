name: Container IC Build Image

on:
  pull_request:
    paths:
      - '.github/workflows/container-autobuild.yml'
      - 'rust-toolchain.toml'
      - 'ci/container/**'
  push:
    branches:
      - 'dev-gh-*'
    paths:
      - '.github/workflows/container-autobuild.yml'
      - 'rust-toolchain.toml'
      - 'ci/container/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build-image-prep:
    name: Build Image Prep
    runs-on: ubuntu-latest
    outputs:
      build_image: ${{ steps.set-output.outputs.build_image }}
      image_tag: ${{ steps.set-output.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set Build Output
        shell: bash
        id: set-output
        run: |
          # Check if we've previously already built ic-build image
          set -eExuo pipefail
          image_tag="$(ci/container/get-image-tag.sh)"
          if grep $image_tag ci/container/TAG; then
            echo "build_image=false" >> "$GITHUB_OUTPUT"
            echo "Update with this image already in this PR!"
            echo "Modify ci/container/TAG with random string to trigger new build."
          else
            echo "build_image=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          fi

  ic-build-image:
    name: Build Container Image ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [build-image-prep]
    if: ${{ needs.build-image-prep.outputs.build_image == 'true' }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - image: ic-build
            target: build
          - image: ic-dev
            target: dev
    outputs:
      ic-build-imageid: ${{ steps.set-output-imageid.outputs.ic-build-imageid }}
      ic-dev-imageid: ${{ steps.set-output-imageid.outputs.ic-dev-imageid }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@a530e948adbeb357dbca95a7f8845d385edf4438 # v3

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Container Image ${{ matrix.image }}
        # this sets the output 'imageid' to the sha256 of the output image
        uses: docker/build-push-action@eb539f44b153603ccbfbd98e2ab9d4d0dcaf23a4 # v5
        id: build
        with:
          context: .
          file: ci/container/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.build-image-prep.outputs.image_tag }}
          target: ${{ matrix.target }}
      - name: Set output imageid
        id: set-output-imageid
        run: |
          if [ "${{ matrix.image }}" == "ic-build" ]; then
            echo "ic-build-imageid=${{ steps.build.outputs.imageid }}" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.image }}" == "ic-dev" ]; then
            echo "ic-dev-imageid=${{ steps.build.outputs.imageid }}" >> $GITHUB_OUTPUT
          else
            echo "Unknown image: ${{ matrix.image }}"
            exit 1
          fi

  bre-worker-image:
    name: Build BRE Worker Image
    # Runs on a Namespace runner where 'nsc' is pre-authenticated. 'update-image-references'
    # waits for this job and pins the resulting digest in the same commit. Like
    # 'ic-build-image', this job is required: if it fails, that's a bug to fix.
    runs-on: namespace-profile-amd64-linux-32x64
    needs: [build-image-prep, ic-build-image]
    # Restricted to the dfinity/ic repo and, for pull_request events, to non-fork
    # PRs -- this job runs on a privileged Namespace runner with pre-authenticated
    # 'nsc', so it must never run untrusted code from a fork.
    if: |
      needs.build-image-prep.outputs.build_image == 'true' &&
      github.repository == 'dfinity/ic' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 30
    outputs:
      worker-imageid: ${{ steps.worker.outputs.worker-imageid }}
    steps:
      - name: Mirror ic-build to nscr.io and optimize for Bazel Remote Execution
        id: worker
        shell: bash
        run: |
          set -xeuo pipefail

          # Mirror the (unchanged) ic-build image -- just pushed to GHCR and pinned by
          # digest -- into the Namespace tenant registry (nscr.io). Namespace BRE
          # workers boot from this image.
          src="ghcr.io/dfinity/ic-build@${{ needs.ic-build-image.outputs.ic-build-imageid }}"
          worker_repo="nscr.io/dfinity/ic-build-worker"
          worker_tag="${{ needs.build-image-prep.outputs.image_tag }}"
          # Use the same fully-qualified ref for the upload destination and the
          # digest lookup so the tag we inspect is guaranteed to be the one we pushed.
          worker_ref="$worker_repo:$worker_tag"

          nsc docker login
          nsc base-image upload "$src" "$worker_ref"

          # BRE requires an immutable digest (mutable tags are rejected). Resolve the
          # digest produced in nscr.io. (Alternatives: 'crane digest' or 'nsc'.)
          worker_digest="$(docker buildx imagetools inspect "$worker_ref" --format '{{.Manifest.Digest}}')"
          echo "Resolved worker image digest: $worker_digest"

          # Optimize the pinned digest into a fast-booting worker variant. This blocks
          # until ready and only needs to be done once per digest.
          nsc base-image optimize --image_ref "$worker_repo@$worker_digest"

          echo "worker-imageid=$worker_digest" >> "$GITHUB_OUTPUT"

  update-image-references:
    name: Update Image References in Repo
    runs-on: ubuntu-latest
    # Waits for the (slower) 'bre-worker-image' to finish before committing: the push
    # this job makes triggers a new workflow run, and 'cancel-in-progress' in the
    # concurrency group would otherwise cancel 'bre-worker-image' mid-optimize.
    # Both 'ic-build-image' and 'bre-worker-image' are required (default 'needs'
    # semantics): if either fails, that's a bug to fix.
    needs: [build-image-prep, ic-build-image, bre-worker-image]
    if: ${{ needs.build-image-prep.outputs.build_image == 'true' }}
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.PR_CREATION_BOT_APP_ID }}
          private-key: ${{ secrets.PR_CREATION_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update Image References
        shell: bash
        run: |
          # Update container image references
          set -xeuo pipefail


          IMAGE_PREFIX="ghcr.io/dfinity/"
          IMG_NAME_IC_BUILD="${IMAGE_PREFIX}ic-build@${{ needs.ic-build-image.outputs.ic-build-imageid }}"
          IMG_NAME_IC_DEV="${IMAGE_PREFIX}ic-dev@${{ needs.ic-build-image.outputs.ic-dev-imageid }}"

          echo '${{ needs.build-image-prep.outputs.image_tag }}' > ci/container/TAG
          pushd .devcontainer
          sed -i -E "s|${IMAGE_PREFIX}ic-dev(:\|@)[^\"]{5,}|$IMG_NAME_IC_DEV|g" -- *
          popd
          pushd .github
          sed -i -E "s|${IMAGE_PREFIX}ic-build(:\|@)[^\"]{5,}|$IMG_NAME_IC_BUILD|g" -- workflow*/*
          popd

          # Pin the BRE worker image (always produced by the required 'bre-worker-image').
          WORKER_PREFIX="nscr.io/dfinity/"
          IMG_NAME_WORKER="${WORKER_PREFIX}ic-build-worker@${{ needs.bre-worker-image.outputs.worker-imageid }}"
          pushd .github
          sed -i -E "s|${WORKER_PREFIX}ic-build-worker(:\|@)[^\"]{5,}|$IMG_NAME_WORKER|g" -- workflow*/*
          popd

          git config --global user.name "IDX GitHub Automation"
          git config --global user.email "<>"
          git add .
          git commit \
            -m 'Updating container images to tag: ${{ needs.build-image-prep.outputs.image_tag }}' \
            -m 'ic-build: ${{ needs.ic-build-image.outputs.ic-build-imageid }}' \
            -m 'ic-dev:   ${{ needs.ic-build-image.outputs.ic-dev-imageid }}' \
            -m 'ic-build-worker: ${{ needs.bre-worker-image.outputs.worker-imageid }}'
          git push

      - name: Add PR Comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        if: ${{ github.event_name == 'pull_request' }}
        with:
          script: |
            // Hidden marker used to find this workflow's comment on subsequent runs
            const marker = '<!-- container-autobuild-image-tag -->';
            let message = marker + '\n'
            message += 'Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n'
            message += 'New container images with tag: `${{ needs.build-image-prep.outputs.image_tag }}`\n'
            message += 'ic-build: `${{ needs.ic-build-image.outputs.ic-build-imageid }}`\n'
            message += 'ic-dev: `${{ needs.ic-build-image.outputs.ic-dev-imageid }}`\n'
            message += 'ic-build-worker: `${{ needs.bre-worker-image.outputs.worker-imageid }}`\n'

            // Find existing comment from this workflow
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes(marker)
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: message
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }
