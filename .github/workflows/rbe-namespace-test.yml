name: RBE Namespace Test

# Experimental: run `bazel test` on Namespace runners using Remote
# Build Execution (RBE). Actions execute on Namespace workers booted from a custom
# worker image (a mirror of ic-build) that is built, optimized and pinned by the
# `container-autobuild.yml` workflow.
#
# See: https://namespace.so/docs/bazel/execution

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Bazel target patterns to test'
        required: false
        default: '//...'
        type: string
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - 'dev-gh-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bazel-test-rbe:
    name: Bazel Test (Remote Build Execution @ Namespace)
    runs-on: namespace-profile-amd64-linux-32x64
    container:
      image: nscr.io/c9ptjuknd7oc6/ic-build-worker@sha256:b3209ba49237175d9f4339daa4b0828f1eee0cf9bd8ccd193af7be4a9663d919
      # ic-os image builds run 'podman build' (rootless) and are forced to run locally in
      # this container by --strategy_regexp=ic-os[:/].*=local in bazel/conf/.bazelrc.build.
      # Rootless podman needs to create user namespaces, which fails in an unprivileged
      # container with "cannot clone: Operation not permitted". Mirror the privileged
      # container options used by the jobs in ci-main.yml so these builds work; the tmpfs
      # at /tmp/containers backs podman's storage (its --root / --runroot).
      options: >-
        --privileged --mount type=tmpfs,target="/tmp/containers"
      volumes:
        - /var/run/nsc/:/var/run/nsc/
    timeout-minutes: 120
    # Opt-in while experimental: manual dispatch, pushes to dev-gh-* branches, or
    # non-fork pull requests labeled 'CI_RBE'. Only on the public repo, where
    # Namespace runners are configured (otherwise the job would get stuck). Fork
    # PRs are excluded because this job runs on a privileged Namespace runner with
    # pre-authenticated 'nsc' and must never execute untrusted PR code.
    if: >-
      github.repository == 'dfinity/ic' &&
      ( github.event_name != 'pull_request' ||
        ( github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'CI_RBE') ) )
    steps:
      - uses: namespacelabs/nscloud-setup@v0
      - name: Set up Bazel Remote Execution
        run: |
          # Provisions the Namespace RBE cluster and writes a bazelrc fragment with
          # the remote executor, remote cache, credentials and recommended defaults.
          # 'nsc' is pre-authenticated on Namespace runners.
          # NOTE: do not print this bazelrc -- it contains short-lived credentials
          # that would leak into the Actions logs.
          nsc bazel execution setup --bazelrc=/tmp/bazel-rbe.bazelrc
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/netrc
      - name: Bazel Test with RBE
        shell: bash
        env:
          BAZEL_TARGETS: ${{ github.event.inputs.targets || '//...' }}
        run: |
          set -euo pipefail

          # Custom worker image: a mirror of ic-build, pinned to an immutable digest
          # and optimized for RBE. The ref below (Namespace tenant registry + digest)
          # is kept up to date automatically by the 'update-image-references' job in
          # container-autobuild.yml.
          # NOTE: the placeholder digest below is replaced on the first ic-build
          # rebuild after this workflow is introduced; until then this job will fail.
          worker_image="docker://nscr.io/c9ptjuknd7oc6/ic-build-worker@sha256:b3209ba49237175d9f4339daa4b0828f1eee0cf9bd8ccd193af7be4a9663d919"

          targets="$BAZEL_TARGETS"
          # Split the (space-separated) target patterns into an array so each is passed
          # as a single, quoted argument -- avoids word-splitting/glob surprises. The
          # 'targets' input is workflow_dispatch-only and this job is gated to non-fork.
          read -ra target_patterns <<<"$targets"
          # We deliberately bypass the workspace .bazelrc (which pulls in the
          # DFINITY-internal cache / remote-execution config) and instead pass the
          # build config plus the Namespace RBE config explicitly, mirroring the
          # bazel-test-arm64 job in ci-main.yml.
          #
          # The Namespace RBE config makes 'remote' the only spawn strategy, but some
          # actions/tests are intentionally not remote-executable -- e.g. bazel_skylib's
          # copy_file (tagged 'no-remote'), rules_python's compile_pip_requirements
          # '.test' target (tagged 'no-remote-exec', 'requires-network') and genrules
          # marked 'local = True' (e.g. //rs/tests:libvirtd and //rs/tests:dnsmasq, which
          # copy host binaries). Those would otherwise fail with "<Mnemonic> spawn cannot
          # be executed with any of the available strategies: [remote]". Adding 'local' as
          # a fallback lets Bazel run exactly those spawns on the runner while everything
          # else still runs remotely (Bazel only falls back when the action forbids remote
          # execution; it does not mask remote failures of normal actions). We set the
          # genrule strategy separately because genrules resolve their strategy via
          # --genrule_strategy / --strategy=Genrule, not --spawn_strategy. These
          # command-line flags override the remote-only strategies from the Namespace
          # bazelrc because command-line flags win, and --strategy=Genrule overrides both
          # --spawn_strategy and --genrule_strategy for the Genrule mnemonic.
          #
          # Namespace's RBE runs with Build-without-the-Bytes, so intermediate action outputs
          # live only in the remote CAS. When the CAS evicts a still-needed blob mid-build,
          # actions fail with "Lost inputs no longer available remotely" or "Exec failed due to
          # IOException: Missing digest" (under BwoB Bazel has no local copy to re-upload). Two
          # flags mitigate this:
          #   --experimental_remote_cache_lease_extension periodically re-issues FindMissingBlobs
          #     for referenced blobs so the CAS extends their TTL and stops evicting live inputs;
          #   --experimental_remote_cache_eviction_retries transparently restarts the invocation
          #     (regenerating the lost inputs) if an eviction still slips through (default is 5).
          # If evictions persist, add --remote_download_all (as bazel/conf/.bazelrc.internal does
          # for the DFINITY cache) to keep outputs on the runner instead of relying on the CAS.
          bazel \
            --noworkspace_rc \
            --bazelrc=./bazel/conf/.bazelrc.build --bazelrc=/tmp/bazel-rbe.bazelrc \
            test \
            --spawn_strategy=remote,local \
            --strategy=Genrule=remote,local \
            --test_tag_filters=-farm_system_test,-system_test_large,-system_test_benchmark,-fuzz_test,-fi_tests_nightly,-nns_tests_nightly,-pocketic_tests_nightly \
            --remote_default_exec_properties=container-image="$worker_image" \
            --experimental_remote_cache_lease_extension \
            --experimental_remote_cache_eviction_retries=10 \
            --keep_going \
            --test_output=errors \
            "${target_patterns[@]}"
