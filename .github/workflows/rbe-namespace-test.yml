name: RBE Namespace Test

# Experimental: run `bazel test` on Namespace runners using Remote
# Build Execution (RBE). Actions execute on Namespace workers booted from a custom
# worker image (a mirror of ic-build) that is built, optimized and pinned by the
# `container-autobuild.yml` workflow.
#
# See: https://namespace.so/docs/bazel/execution

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - 'dev-gh-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bazel-test-rbe:
    name: Bazel Test (Remote Build Execution @ Namespace)
    runs-on: namespace-profile-amd64-linux-32x64
    container:
      image: nscr.io/c9ptjuknd7oc6/ic-build-worker@sha256:7dc37b193456f1dfa9d40d800fb0b26b4e1da8e5f61d9cf715bf037213e3d028
      # ic-os image builds run 'podman build' (rootless) and are forced to run locally in
      # this container by --strategy_regexp=ic-os[:/].*=local in bazel/conf/.bazelrc.build.
      # Rootless podman needs to create user namespaces, which fails in an unprivileged
      # container with "cannot clone: Operation not permitted".
      options: >-
        --privileged --mount type=tmpfs,target="/tmp/containers"
      volumes:
        - /var/run/nsc/:/var/run/nsc/
      # Forward the Namespace credentials into the container so the
      # namespace-actions/upload-artifact step can authenticate against Namespace
      # Artifact Storage from inside the job container. See:
      # https://namespace.so/docs/reference/github-actions/upload-artifact
      env:
        NSC_TOKEN_FILE: ${{ env.NSC_TOKEN_FILE }}
        NAMESPACE_ACTIONS_RESULTS_URL: ${{ env.NAMESPACE_ACTIONS_RESULTS_URL }}
        NAMESPACE_ACTIONS_RESULTS_SERVICE: ${{ env.NAMESPACE_ACTIONS_RESULTS_SERVICE }}
        NAMESPACE_ACTIONS_DIRECT_ZIP_UPLOAD: ${{ env.NAMESPACE_ACTIONS_DIRECT_ZIP_UPLOAD }}
    timeout-minutes: 150
    if: >-
      github.repository == 'dfinity/ic' &&
      ( github.event_name != 'pull_request' ||
        ( github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'CI_RBE') ) )
    steps:
      - uses: namespacelabs/nscloud-setup@v0
      - name: Set up Bazel Remote Execution
        run: |
          nsc bazel execution setup --enable_remote_asset_api --bazelrc=/tmp/bazel-rbe.bazelrc
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/netrc
      - name: Bazel Test with RBE (no system-tests)
        timeout-minutes: 60
        shell: bash
        run: |
          set -euo pipefail

          worker_image="docker://nscr.io/c9ptjuknd7oc6/ic-build-worker@sha256:7dc37b193456f1dfa9d40d800fb0b26b4e1da8e5f61d9cf715bf037213e3d028"

          # Directory for the Build Event Protocol and execution profile files,
          # later uploaded to Namespace Artifact Storage for offline analysis.
          mkdir -p /tmp/bep

          bazel_args=(
            --noworkspace_rc
            --bazelrc=./bazel/conf/.bazelrc.build
            --bazelrc=/tmp/bazel-rbe.bazelrc

            test

            --config=flaky_retry

            --spawn_strategy=remote,sandboxed,local
            --strategy=Genrule=remote,sandboxed,local

            --jobs=64

            --test_tag_filters=-local_system_test,-farm_system_test,-system_test_large,-system_test_benchmark,-fuzz_test,-fi_tests_nightly,-nns_tests_nightly,-pocketic_tests_nightly

            --remote_default_exec_properties=container-image="$worker_image"

            # Namespace's RBE runs with Build-without-the-Bytes (BwoB), so intermediate action
            # outputs live only in the remote CAS. When the CAS evicts a still-needed blob
            # mid-build, actions fail with "Lost inputs no longer available remotely" or
            # "Exec failed due to IOException: Missing digest" (under BwoB Bazel has no local
            # copy to re-upload). Periodically re-issue FindMissingBlobs for referenced blobs
            # so the CAS extends their TTL and stops evicting live inputs.
            --experimental_remote_cache_lease_extension
            --experimental_remote_cache_eviction_retries=10

            --remote_download_minimal

            # Capture the Build Event Protocol and the execution profile so this
            # invocation can be analyzed offline (e.g. `bazel analyze-profile`,
            # BuildBuddy, EngFlow). Both are uploaded to Namespace Artifact Storage
            # by the "Upload Bazel BEP" step below.
            --build_event_binary_file=/tmp/bep/bazel-bep-tests.pb
            --profile=/tmp/bep/profile-tests.json
            --experimental_profile_include_target_label

            --keep_going
          )

          bazel "${bazel_args[@]}" //...

      - name: Bazel Test with RBE (only system-tests)
        # Run even if the previous "no system-tests" step failed, but not when the job is cancelled.
        if: ${{ !cancelled() }}
        timeout-minutes: 60
        shell: bash
        run: |
          set -euo pipefail

          worker_image="docker://nscr.io/c9ptjuknd7oc6/ic-build-worker@sha256:7dc37b193456f1dfa9d40d800fb0b26b4e1da8e5f61d9cf715bf037213e3d028"

          # Directory for the Build Event Protocol and execution profile files,
          # later uploaded to Namespace Artifact Storage for offline analysis.
          mkdir -p /tmp/bep

          bazel_args=(
            --noworkspace_rc
            --bazelrc=./bazel/conf/.bazelrc.build
            --bazelrc=/tmp/bazel-rbe.bazelrc

            test

            --config=flaky_retry

            --spawn_strategy=remote,sandboxed,local
            --strategy=Genrule=remote,sandboxed,local

            --jobs=64

            --test_tag_filters=-farm_system_test,-system_test_large,-system_test_benchmark,-fuzz_test,-fi_tests_nightly,-nns_tests_nightly,-pocketic_tests_nightly

            --remote_default_exec_properties=container-image="$worker_image"

            # Namespace's RBE runs with Build-without-the-Bytes (BwoB), so intermediate action
            # outputs live only in the remote CAS. When the CAS evicts a still-needed blob
            # mid-build, actions fail with "Lost inputs no longer available remotely" or
            # "Exec failed due to IOException: Missing digest" (under BwoB Bazel has no local
            # copy to re-upload). Periodically re-issue FindMissingBlobs for referenced blobs
            # so the CAS extends their TTL and stops evicting live inputs.
            --experimental_remote_cache_lease_extension
            --experimental_remote_cache_eviction_retries=10

            --remote_download_minimal

            # Capture the Build Event Protocol and the execution profile so this
            # invocation can be analyzed offline (e.g. `bazel analyze-profile`,
            # BuildBuddy, EngFlow). Both are uploaded to Namespace Artifact Storage
            # by the "Upload Bazel BEP" step below.
            --build_event_binary_file=/tmp/bep/bazel-bep-systests.pb
            --profile=/tmp/bep/profile-systests.json
            --experimental_profile_include_target_label

            --keep_going
          )

          bazel "${bazel_args[@]}" //rs/tests/...

      - name: Upload Bazel BEP and profile to Namespace Artifact Storage
        # Store the Build Event Protocol (.pb) and execution profile (.json) from
        # both bazel invocations in Namespace's private, workspace-scoped Artifact
        # Storage. Runs on success or failure so we always capture insight, but not
        # when the job is cancelled. Retrieve later with
        # namespace-actions/download-artifact or `nsc artifact`. No GPG encryption
        # is needed: the storage is private to the workspace and access-controlled.
        if: ${{ !cancelled() }}
        uses: namespace-actions/upload-artifact@v1
        with:
          name: bazel-bep-rbe
          path: /tmp/bep/*
          if-no-files-found: ignore
          retention-days: 14
