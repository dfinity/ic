name: RBE Namespace Test

# Experimental: run `bazel test` on Namespace runners using Remote
# Build Execution (RBE). Actions execute on Namespace workers booted from a custom
# worker image (a mirror of ic-build) that is built, optimized and pinned by the
# `container-autobuild.yml` workflow.
#
# See: https://namespace.so/docs/bazel/execution

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Bazel target patterns to test'
        required: false
        default: '//...'
        type: string
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - 'dev-gh-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bazel-test-rbe:
    name: Bazel Test (Remote Build Execution @ Namespace)
    runs-on: namespace-profile-amd64-linux-32x64
    container:
      image: nscr.io/c9ptjuknd7oc6/ic-build-worker@sha256:65f912a41be8cf3e9247d8dc34f317ddfc11badf8dc93f137c1702d6a2cd2790
      # ic-os image builds run 'podman build' (rootless) and are forced to run locally in
      # this container by --strategy_regexp=ic-os[:/].*=local in bazel/conf/.bazelrc.build.
      # Rootless podman needs to create user namespaces, which fails in an unprivileged
      # container with "cannot clone: Operation not permitted".
      options: >-
        --privileged --mount type=tmpfs,target="/tmp/containers"
      volumes:
        - /var/run/nsc/:/var/run/nsc/
    timeout-minutes: 120
    if: >-
      github.repository == 'dfinity/ic' &&
      ( github.event_name != 'pull_request' ||
        ( github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'CI_RBE') ) )
    steps:
      - uses: namespacelabs/nscloud-setup@v0
      - name: Set up Bazel Remote Execution
        run: |
          nsc bazel execution setup --bazelrc=/tmp/bazel-rbe.bazelrc
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/netrc
      - name: Bazel Test with RBE
        shell: bash
        env:
          BAZEL_TARGETS: ${{ github.event.inputs.targets || '//...' }}
        run: |
          set -euo pipefail

          worker_image="docker://nscr.io/c9ptjuknd7oc6/ic-build-worker@sha256:65f912a41be8cf3e9247d8dc34f317ddfc11badf8dc93f137c1702d6a2cd2790"

          targets="$BAZEL_TARGETS"
          read -ra target_patterns <<<"$targets"

          bazel_args=(
            --noworkspace_rc
            --bazelrc=./bazel/conf/.bazelrc.build
            --bazelrc=/tmp/bazel-rbe.bazelrc

            test

            --spawn_strategy=remote,sandboxed,local
            --strategy=Genrule=remote,sandboxed,local

            --test_tag_filters=-farm_system_test,-system_test_large,-system_test_benchmark,-fuzz_test,-fi_tests_nightly,-nns_tests_nightly,-pocketic_tests_nightly

            --remote_default_exec_properties=container-image="$worker_image"

            # Namespace's RBE runs with Build-without-the-Bytes (BwoB), so intermediate action
            # outputs live only in the remote CAS. When the CAS evicts a still-needed blob
            # mid-build, actions fail with "Lost inputs no longer available remotely" or
            # "Exec failed due to IOException: Missing digest" (under BwoB Bazel has no local
            # copy to re-upload). Periodically re-issue FindMissingBlobs for referenced blobs
            # so the CAS extends their TTL and stops evicting live inputs. (If evictions
            # persist, add --remote_download_all, as bazel/conf/.bazelrc.internal does for the
            # DFINITY cache, to keep outputs on the runner instead of relying on the CAS.)
            --experimental_remote_cache_lease_extension
            --experimental_remote_cache_eviction_retries=10

            --keep_going
            --test_output=errors
          )

          bazel "${bazel_args[@]}" "${target_patterns[@]}"
