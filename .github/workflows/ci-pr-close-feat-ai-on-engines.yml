name: Close External PRs Targeting feat-ai-on-engines

on:
  pull_request_target:
    types: [opened, reopened]
    branches:
      - feat-ai-on-engines

permissions:
  contents: read
  pull-requests: write

jobs:
  close-pr:
    name: Close fork PR targeting feat-ai-on-engines
    runs-on: ubuntu-latest
    # Only act on PRs from forks (external contributors).
    if: github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Close PR with explanation
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const message = [
              "Thanks for the contribution!",
              "",
              "Pull requests from forks targeting the `feat-ai-on-engines` branch are not accepted.",
              "This branch is a feature branch managed internally; please retarget your PR to `master` instead.",
              "",
              "Closing this PR automatically. Feel free to open a new one against `master`.",
              "",
              "— The DFINITY Foundation"
            ].join("\n");

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message,
            });

            await github.rest.pulls.update({
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
            });
