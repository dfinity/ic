[package]
name = "ic-hpke"
version = "0.1.0"
description = "A package created for the Internet Computer Protocol for Hybrid Public Key Encryption"
license = "Apache-2.0"
readme = "README.md"
include = ["src", "Cargo.toml", "CHANGELOG.md", "LICENSE", "README.md"]
repository = "https://github.com/dfinity/ic"
authors.workspace = true
edition.workspace = true
documentation.workspace = true

[dependencies]
hpke = { version = "0.13", default-features = false, features = [ "p384", "alloc" ] }

[dev-dependencies]
hex = { workspace = true }
rand = { version = "0.9", default-features = false, features = ["os_rng"] }
rand_chacha = { version = "0.9", default-features = false }
