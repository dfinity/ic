# Agentic Refactor Harness Configuration
# https://github.com/ianblenke/agentic-refactor-rules

harness_version: "1.1"
project: "dfinity/ic"
methodology: "BMAD + OpenSpec + context-resets"

# Claude Code Adaptation Notes (from revised agentic-refactor-rules)
# 1. CLAUDE.md is a lower-priority <system-reminder> — keep it lean (<300 lines, factual only)
# 2. Use .claude/rules/ for path-scoped rules injected when touching relevant files
# 3. Use hooks (PreToolUse/PostToolUse) for hard gates — deterministic > probabilistic
# 4. Frame roles as task scoping ("Your task is X") — NEVER persona adoption ("You are Quinn")
# 5. Rotate sessions at phase boundaries — never rely on compaction
# 6. The orchestrator is NEVER an LLM — deterministic script only

agents:
  planner:
    model: sonnet
    mode: auto
    tools: [read, glob, grep, web_search]
    context_limit: fresh_per_plan
    output: epics/stories/

  architect:
    model: opus
    mode: auto
    tools: [read, glob, grep]
    context_limit: fresh_per_design
    output: _bmad/

  generator:
    model: opus
    mode: auto
    tools: [read, edit, write, glob, grep, bash]
    context_limit: fresh_per_story
    output: openspec/capabilities/

  evaluator:
    model: opus
    mode: auto
    tools: [read, glob, grep, bash]
    context_limit: fresh_per_evaluation
    receives: [story_spec, sprint_contract]
    never_receives: [generator_context]

  orchestrator:
    type: deterministic_script
    reads: .harness/handoffs/
    writes: .harness/handoffs/
    enforces: .harness/contracts/

tool_annotations:
  readOnlyHint: true         # enables parallel tool execution for read-only tools
  destructiveHint: false     # distinguishes read vs write tools for safety

coverage_gates:
  spec_coverage: 100%       # every REQ-* has at least one test
  scenario_coverage: 100%   # every SCENARIO-* has integration or E2E test
  reverse_spec_coverage: 100%  # every test must reference a REQ-*/SCENARIO-* (NEW)
  code_coverage_new: 80%    # line coverage on new files
  branch_coverage_new: 70%  # branch coverage on new files

hard_fail_conditions:
  - spec_contradiction       # implementation contradicts spec.md
  - broken_build             # bazel build fails
  - security_regression      # security-relevant invariant broken
  - data_loss                # canister state can be corrupted/lost
  - assertion_spec_mismatch_critical  # assertion completely misses requirement (NEW)

evaluation_gates:
  gate_1_generator:          # Generator self-check
    - tests_pass
    - coverage_thresholds_met
    - no_orphan_tests         # tests without REQ-*/SCENARIO-* citations (NEW)
  gate_2_evaluator:          # Independent evaluator verification
    - independent_test_run
    - spec_coverage_audit
    - test_quality_check
    - e2e_verification
    - assertion_spec_audit    # critical mismatches = hard fail (NEW)
  gate_3_final:              # Cross-sprint validation (NEW)
    - full_scenario_regression_100_percent
    - cross_story_e2e_100_percent
    - assertion_spec_partial_mismatches_zero
    - traceability_consistency

migration_order:
  - execution-scheduler      # DONE — template
  - execution-canister-lifecycle
  - execution-cycles
  - execution-dts
  - execution-wasm
  - execution-system-api
  - execution-memory
  - execution-query
  - consensus
  - messaging
  - networking-https-outcalls
  - state-replicated
  - state-manager
  - state-checkpoint
  - state-certification
  - crypto-signatures
  - crypto-dkg
  - crypto-threshold
  # ... remaining domains
