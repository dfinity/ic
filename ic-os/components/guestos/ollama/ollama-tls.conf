# stunnel configuration for the ollama TLS reverse proxy.
#
# Terminates TLS on 0.0.0.0:11434 with a self-signed certificate generated
# at first boot by generate-ollama-tls-cert.service, and forwards
# plaintext traffic to the local ollama backend on 127.0.0.1:11435.

# Foreground mode is required so systemd can supervise the process
# directly (Type=simple in ollama-tls.service). With foreground = yes,
# stunnel writes log lines to stderr, which systemd captures into the
# journal -- there's no need (and no point) in setting `output = ...`,
# which fails to reopen after the post-bind setuid drop to the stunnel4
# user.
foreground = yes

# Don't write a pidfile; systemd tracks the main PID directly.
pid =

# Drop privileges after binding to the listener.
setuid = stunnel4
setgid = stunnel4

# Single combined PEM containing both the cert and the private key,
# produced by generate-ollama-tls-cert.sh.
cert = /var/lib/ollama-tls/stunnel.pem

# We don't authenticate clients (untrusted self-signed cert anyway).
verify = 0

[ollama]
# IPv6 wildcard with dual-stack enabled (the kernel default in Ubuntu via
# net.ipv6.bindv6only=0) means this single socket also accepts IPv4
# connections via v4-mapped addresses.
accept = :::11434
connect = 127.0.0.1:11435
