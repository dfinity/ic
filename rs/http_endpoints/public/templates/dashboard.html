<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internet Computer Replica Dashboard</title>
    <style>
        div {
            margin: 6px;
        }

        h3 {
            margin-block-end: 0;
        }

        .debug {
            background-color: #eef;
            font-family: monospace;
            border: 1px solid #aaf;
        }

        span.debug {
            padding: 4px;
        }

        div.debug {
            display: block;
            padding: 10px;
        }

        td, th {
            padding: 0 10px 2px 0;
            vertical-align: text-top;
        }

        .number {
            text-align: right;
        }

        .text {
            text-align: left;
        }

        .row-separator {
            background-color: #aaf;
            height: 2px;
            padding: 0px;
        }

        .verbose {
            position: absolute;
            font-family: monospace;
            background-color: #ffa;
            border: 1px solid #ff0;
            padding: 4px;
        }
    </style>
</head>
<body>
<h1>Internet Computer Replica Dashboard</h1>

<h2>Subnet Settings & Parameters</h2>
<table>
    <tr>
        <td>Replica Version</td>
        <td class="debug">{{ self.foo.to_string() }}</td>
    </tr>
</table>
</body>
</html>
