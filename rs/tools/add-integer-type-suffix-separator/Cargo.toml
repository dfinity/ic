[package]
name = "add-integer-type-suffix-separator"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "add-integer-type-suffix-separator"
path = "src/main.rs"

[dependencies]
anyhow = "1"
lazy_static = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }
regex = "1"
syn = { version = "2", features = ["full", "visit"] }
walkdir = "2"
