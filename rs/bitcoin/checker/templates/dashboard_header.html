<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bitcoin Checker Canister Dashboard for ({NETWORK})</title>
    <style>
        details {
            margin-right: 1rem;
            min-width: 20rem;
        }
        details[disabled] summary {
            pointer-events: none;
            user-select: none;
        }
        summary {
            display: block;
            padding-left: 1.5rem;
            position: relative;
            user-select: none;
        }
        .live > summary:before {
            content: '';
            border-width: .4rem;
            border-style: solid;
            border-color: transparent transparent transparent #000;
            position: absolute;
            top: 0.2rem;
            left: 0.5rem;
            transform: rotate(0);
            transform-origin: .2rem 50%;
            transition: .25s transform ease;
        }
        details[open] > summary:before {
            transform: rotate(90deg);
        }
        details summary.live::-webkit-details-marker {
            display:none;
        }
        details > ul {
            margin: 0;
            padding-top: 0.5em;
            padding-left: 1.5rem;
            list-style-type: none;
            max-width: 20rem;
        }
        table {
            border: solid;
            text-align: left;
            width: 100%;
            border-width: thin;
        }
        h3 {
            font-variant: small-caps;
            margin-top: 30px;
            margin-bottom: 5px;
        }
        table table {
            font-size: small;
        }
        .background {
            margin: 0;
            padding: 0;
        }
        .content {
            max-width: 100vw;
            width: fit-content;
            margin: 0 auto;
        }
        tbody tr:nth-child(odd) {
            background-color: #eeeeee;
        }
        tbody tr:nth-child(even) {
            background-color: #ffffff;
        }
        td {
            padding: 0.5em;
            vertical-align: top;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="content">
            <h2>Bitcoin Checker Canister Dashboard for ({NETWORK})</h2>
